<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="style.css" />
        <script src="script.js" defer></script>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
        <title>Titan Gym</title>
    </head>
    <body>
        <nav id="navbar">
            <div class="burger" onclick="toggleMenu()">
                    <div class="line"></div>
                    <div class="line"></div>
                    <div class="line"></div>
            </div>
            <a href="index.html" id="logo"><span>Titan Gym</span></a>
                <ul>
                    <li><a href="#Home">Home</a></li>
                    <li><a href="#About">About</a></li>
                    <li><a href="#Services">Services</a></li>
                    <li><a href="#Membership">Membership</a></li>
                    <li><a href="#Contact">Contact</a></li>
                </ul>
                    <button id="toggleFormBtn">Subscribe</button>
        </nav>
            <div class="container">
                <div id="Home">
                    <form id="loginForm">
                        <img src="Banner.jpg">
                        <input type="text" name="username" placeholder="Username" required>
                        <input type="password" name="password" placeholder="Password" required>
                        <button type="submit">Subscribe</button>
                    </form>
                        <div class="typewriter-container">
                            <p class="typewriter-line" style="animation-delay: 0s">Welcome to Titan</p>
                            <p class="typewriter-line gym" style="animation-delay: 1s">Gym.</p>
                        </div>
                </div>
            <div id="About">
                <div class="cards-container">
                    <div class="card">
                        <div class="card-content">
                            <i class="fas fa-envelope email-icon"></i>
                            <h2>E-mail</h2>
                            <p>someone@gmail.com</p>
                        </div>
                    </div>
                    <div class="card">
                        <div class="card-content">
                            <i class="fas fa-phone email-icon"></i>
                            <h2>Phone Number</h2>
                            <p>0123456789</p>
                        </div>
                    </div>
                    <div class="card">
                        <div class="card-content">
                            <i class="fas fa-map-marker-alt email-icon"></i>
                            <h2>Address</h2>
                            <p>10 St, New York</p>
                        </div>
                    </div>
                </div>
            </div>
            <div id="Services">
                
            </div>
            <div id="Membership">
                
            </div>
            <div id="Contact">
                
            </div>
            <div id="Footer">
                
            </div>
        </div>
    </body>
</html>
